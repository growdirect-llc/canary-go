# deploy/cloudbuild.gateway.yaml
#
# Cloud Build pipeline: build the gateway container, push to Artifact
# Registry, deploy to Cloud Run STAGING. Production promotion is manual
# (gcloud run services update-traffic ... --to-latest), documented in
# deploy/runbook-gateway-deploy.md §10.
#
# Trigger: push to gclyle/gro-746-* OR main (configure in runbook §3).
# Substrate: project=canary-rapidpos, region=us-central1, SA=canary-deploy.
#
# Substitutions:
#   _REGION         — GCP region (default us-central1)
#   _REPO           — Artifact Registry repo name (default canary-go)
#   _SERVICE        — Cloud Run service name (default canary-gateway-staging)
#   _SQL_INSTANCE   — Cloud SQL instance connection name (canary-rapidpos:us-central1:canary-pg)
#   _VPC_CONNECTOR  — Serverless VPC connector for Memorystore reach (canary-vpc-conn)
#
# Build context is CanaryGo/ — invoke from that directory or via
# `gcloud builds submit --config=deploy/cloudbuild.gateway.yaml`.

substitutions:
  _REGION: us-central1
  _REPO: canary-go
  _SERVICE: canary-gateway-staging
  _SQL_INSTANCE: canary-rapidpos:us-central1:canary-pg
  _VPC_CONNECTOR: canary-vpc-conn

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

# Use the canary-deploy service account so all build-time GCP calls run
# as least-privilege — see Brain/wiki/cards/gcp-foundation-runbook.md.
serviceAccount: projects/canary-rapidpos/serviceAccounts/canary-deploy@canary-rapidpos.iam.gserviceaccount.com

steps:

  # 1. Build the container. Tag with both $SHORT_SHA (immutable) and
  #    "latest" (convenience pointer for staging).
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - deploy/Dockerfile.gateway
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gateway:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gateway:latest
      - .

  # 2. Push both tags.
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gateway:$SHORT_SHA

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gateway:latest

  # 3. Deploy to Cloud Run staging.
  #    - --no-allow-unauthenticated: traffic enters via Cloud LB only;
  #      direct *.run.app URL is locked. Cloud LB is the public entry.
  #    - --add-cloudsql-instances: enables Cloud SQL Auth Proxy sidecar.
  #    - --vpc-connector: required for Memorystore reach (private IP only).
  #    - --service-account: runtime SA distinct from build SA.
  #    - Secrets resolved at deploy time — DATABASE_URL, VALKEY_URL,
  #      INTERNAL_SERVICE_SECRET, SESSION_SECRET come from Secret Manager.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [push-sha]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gateway:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --service-account=canary-gateway-rt@$PROJECT_ID.iam.gserviceaccount.com
      - --add-cloudsql-instances=${_SQL_INSTANCE}
      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only
      - --min-instances=1
      - --max-instances=10
      - --concurrency=80
      - --cpu=1
      - --memory=512Mi
      - --timeout=30s
      - --port=8080
      - --set-env-vars=LOG_LEVEL=info
      - --set-secrets=DATABASE_URL=canary-gateway-database-url:latest
      - --set-secrets=VALKEY_URL=canary-gateway-valkey-url:latest
      - --set-secrets=INTERNAL_SERVICE_SECRET=canary-gateway-internal-service-secret:latest
      - --set-secrets=SESSION_SECRET=canary-gateway-session-secret:latest
      - --labels=service=gateway,env=staging,patent=63-991-596

# Images pushed (registered in build artifacts metadata).
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gateway:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gateway:latest

timeout: 1200s
