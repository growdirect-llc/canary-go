name: canarygo

networks:
  growdirect:
    external: true

services:
  canarygo-dbinit:
    image: postgres:17
    networks: [growdirect]
    entrypoint: >
      sh -c "
        psql -h growdirect_postgres -U growdirect -c 'CREATE DATABASE canary_gcp;' || true &&
        psql -h growdirect_postgres -U growdirect -c 'CREATE DATABASE canary_gcp_test;' || true
      "
    environment:
      PGPASSWORD: growdirect_dev

  canarygo-migrate:
    image: migrate/migrate:v4.17.0
    networks: [growdirect]
    volumes:
      - ./migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://growdirect:growdirect_dev@growdirect_postgres:5432/canary_gcp?sslmode=disable
      up
    depends_on:
      canarygo-dbinit:
        condition: service_completed_successfully

  canarygo-gateway:
    image: canarygo-gateway
    build:
      context: ../
      dockerfile: deploy/Dockerfile.gateway
    networks: [growdirect]
    ports:
      - "9080:8080"
    environment:
      DATABASE_URL: postgres://growdirect:growdirect_dev@growdirect_postgres:5432/canary_gcp?sslmode=disable
      VALKEY_URL: redis://:valkey_dev@growdirect_valkey:6379/2
      INTERNAL_SERVICE_SECRET: dev-internal-secret
      SESSION_SECRET: dev-session-secret
      LOG_LEVEL: info
      PORT: "8080"
      SECRET_BACKEND: pgx
      LNURL_STUB: "true"
      LNURL_SCHEME: http
      LNURL_HOST: localhost:8080
      DEV_CONSOLE: "1"
      # DEV_DEMO_LOGIN=1 surfaces the dev-only "Demo Login" button on
      # /login. Clicking it signs a session cookie for the seeded
      # Acme Main Street merchant (33333333-...) so dev environments
      # without Square OAuth credentials can still reach merchant pages.
      # Production never sets this. handleDevDemoLogin 404s when unset.
      DEV_DEMO_LOGIN: "1"
      # MANIFEST_ROUTEWALK=1 dumps every mounted route to routes-seen.json
      # on each boot. Pure observation; consumed by reconcile.py to detect
      # drift between the manifest and the live router. GRO-836 / GRO-838.
      MANIFEST_ROUTEWALK: "1"
      MANIFEST_ROUTEWALK_OUT: "/services/canary-protocol/manifest/build/routes-seen.json"
    # Mount the manifest pipeline outputs into the gateway container so
    # /devops/catalog + /devops/api-docs read live data, and so the routewalk
    # dump above lands on the host. Read-only on the canary-protocol root,
    # writable on the build/ subpath (gitignored). Run `make manifest` from
    # the repo root to regenerate the spec artifacts. GRO-836.
    volumes:
      - ../../services/canary-protocol:/services/canary-protocol:ro
      - ../../services/canary-protocol/manifest/build:/services/canary-protocol/manifest/build
    depends_on:
      canarygo-migrate:
        condition: service_completed_successfully

  canarygo-identity:
    image: canarygo-identity
    build:
      context: ../
      dockerfile: deploy/Dockerfile.identity
    networks: [growdirect]
    ports:
      - "8086:8086"
    environment:
      DATABASE_URL: postgres://growdirect:growdirect_dev@growdirect_postgres:5432/canary_gcp?sslmode=disable
      VALKEY_URL: redis://:valkey_dev@growdirect_valkey:6379/2
      INTERNAL_SERVICE_SECRET: dev-internal-secret
      SESSION_SECRET: dev-session-secret
      LOG_LEVEL: info
      PORT: "8086"
    depends_on:
      canarygo-dbinit:
        condition: service_completed_successfully
