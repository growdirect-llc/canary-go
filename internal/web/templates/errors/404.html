{{template "base.html" .}}

{{define "title"}}Page Not Found — Canary{{end}}

{{define "content"}}
<div style="text-align:center;padding:80px 20px;max-width:480px;margin:0 auto;">
  <div style="font-size:4rem;margin-bottom:16px;opacity:0.3;">🔍</div>
  <h2 style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;color:var(--text-primary);margin-bottom:12px;">Page Not Found</h2>
  <p style="color:var(--text-secondary);font-size:0.95rem;line-height:1.6;margin-bottom:32px;">
    The page you're looking for doesn't exist or has been moved.
  </p>
  <a href="/dashboard" style="display:inline-block;padding:10px 24px;background:var(--color-canary);color:#0d1117;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.9rem;">
    Back to Dashboard
  </a>
</div>
{{end}}
