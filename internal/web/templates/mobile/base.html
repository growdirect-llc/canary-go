{{define "mobile_base.html"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="csrf-token" content="{{.CSRFToken}}" />
  <title>{{block "title" .}}Canary Mobile{{end}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin:0; padding:0; background:#0d1117; color:#e6edf3; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    body { padding:0; min-height:100vh; }
    :root {
      --bg-surface:#161b22; --border-subtle:#30363d; --text-primary:#e6edf3; --text-secondary:#9da7b3; --text-muted:#6e7681;
      --signal-yellow:#fbbf24; --health-green:#10b981; --accent-blue:#3b82f6; --critical-red:#ef4444;
    }
    .m-shell { max-width: 480px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }
    .m-header { padding: 12px 0 16px 0; border-bottom: 1px solid var(--border-subtle); margin-bottom: 16px; }
    .m-header h1 { margin: 0; font-size: 22px; font-weight: 700; }
    .m-header p { margin: 4px 0 0 0; font-size: 13px; color: var(--text-muted); }
    .m-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .m-row { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border-subtle); }
    .m-row:last-child { border-bottom: none; }
    .m-row strong { font-size: 16px; color: var(--text-primary); }
    .m-row small { font-size: 12px; color: var(--text-muted); }
    .m-btn { display: block; width: 100%; padding: 14px 16px; font-size: 14px; font-weight: 600; text-align: center; border: none; border-radius: 10px; cursor: pointer; text-decoration: none; }
    .m-btn-primary { background: var(--signal-yellow); color: #0d1117; }
    .m-btn-secondary { background: transparent; color: var(--text-primary); border: 1px solid var(--border-subtle); }
    .m-flash { margin-bottom: 12px; padding: 12px 14px; background: rgba(234,179,8,0.10); border: 1px solid var(--signal-yellow); border-radius: 10px; font-size: 13px; color: var(--signal-yellow); }
    .m-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .m-tabbar { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; display: flex; background: var(--bg-surface); border-top: 1px solid var(--border-subtle); }
    .m-tabbar a { flex: 1; padding: 12px; text-align: center; font-size: 11px; color: var(--text-muted); text-decoration: none; }
    .m-tabbar a.active { color: var(--signal-yellow); }
    .m-scan-hint { padding: 18px; background: var(--bg-surface); border: 1px dashed var(--border-subtle); border-radius: 10px; text-align: center; color: var(--text-muted); font-size: 12px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="m-shell">
    {{block "content" .}}{{end}}
  </div>
  <nav class="m-tabbar">
    <a href="/m/tasks">Tasks</a>
    <a href="/m/receiving">Receiving</a>
    <a href="/m/cycle-count">Cycle</a>
    <a href="/dashboard">Desktop</a>
  </nav>
</body>
</html>{{end}}
