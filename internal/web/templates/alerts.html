{{template "base.html" .}}

{{define "title"}}Alerts — Canary{{end}}

{{define "content"}}
<div class="page-header">
  <h1>Alerts</h1>
  <p class="page-subtitle">{{.OpenCount}} open &middot; {{.TotalCount}} total</p>
</div>

{{if .Alerts}}
<div class="ops-card">
  {{range .Alerts}}
  <div style="display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border-subtle);">
    <span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;background:{{if eq .Severity "critical"}}var(--critical-red){{else if eq .Severity "high"}}var(--signal-yellow){{else}}var(--accent-blue){{end}};"></span>
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:13px;font-weight:600;color:var(--text-primary);">{{.Title}}</span>
        <span class="badge">{{.Status}}</span>
        <span style="font-size:11px;color:var(--text-muted);margin-left:auto;">{{.CreatedAt}}</span>
      </div>
      <div style="font-size:13px;color:var(--text-secondary);margin-top:3px;">{{.Description}}</div>
    </div>
    <a href="/alerts/{{.ID}}" style="font-size:11px;color:var(--signal-yellow);white-space:nowrap;">View →</a>
  </div>
  {{end}}
</div>
{{else}}
<div style="text-align:center;padding:60px 20px;color:var(--text-muted);">
  <div style="font-size:3rem;margin-bottom:12px;opacity:0.3;">✓</div>
  <p style="font-size:14px;">No open alerts.</p>
</div>
{{end}}
{{end}}
