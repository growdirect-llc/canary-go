openapi: 3.0.3
info:
  title: "Canary Protocol \u2014 Canonical Retail Substrate"
  version: 0.1.0
  description: "Developer-facing OpenAPI 3.0 contract for the Canary Protocol canonical retail data model. Auto-generated\
    \ from `docs/sdds/go-handoff/canonical-data-model.md` \u2014 do not hand-edit. Patent context: Application 63/991,596\
    \ (Universal Event Notarization). This OpenAPI surface is the developer-facing layer. The MCP-native agent surface lives\
    \ at the `mcp__canary-protocol__*` tools (see GRO-741). The patent-architecture endpoints under `Protocol-Patent` are\
    \ reserved here and built in their own dispatches."
  contact:
    name: GrowDirect, LLC
  license:
    name: "Proprietary \u2014 Patent Pending"
    url: https://growdirect.io
servers:
- url: https://api.canary.growdirect.io
  description: Production
- url: https://api.canary-staging.growdirect.io
  description: Staging
tags:
- name: M-Merchandising
  description: 'Master merchandising data: items, vendors, categories'
- name: A-Location
  description: Stores, warehouses, location hierarchy
- name: S-Space
  description: Planograms, shelf positions
- name: C-Customer
  description: Customer master, addresses, loyalty
- name: L-Labor
  description: Employees, roles, location assignments
- name: D-Inventory
  description: Inventory positions, movements, documents, lots
- name: O-Orders
  description: Purchase orders, sales orders, fulfillment, allocations
- name: P-Pricing
  description: Item prices, promotions, taxes
- name: F-Finance
  description: Tender types, GL accounts, supplier invoices, payments
- name: T-Transactions
  description: POSLog transactions, line items, tenders, drawer events
- name: Q-Loss-Prevention
  description: Detection rules, detections, cases, evidence, subjects
- name: Ledger-Cost-to-Serve
  description: Stock ledger, ILDWAC positions, RIB batches, blockchain anchors
- name: Cross-Cutting-Platform
  description: Tenants, users, audit log, external identities
- name: Protocol-Patent
  description: Patent-architecture endpoints (Application 63/991,596). Reserved here; built in dedicated dispatches GRO-746
    / 748 / 750 / 751 / 752.
