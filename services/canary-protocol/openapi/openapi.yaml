          type: string
          description: shelf-name (full-text indexed)
        short_description: &id004
          type: string
          description: receipt-name
        item_type: &id005
          type: string
          description: "standard | service | giftcard | tare | pack | bundle \xB7 default: 'standard'"
        category_id: &id006
          type: string
