  /v1/protocol/webhook/{source}:
    post:
      tags:
      - Protocol-Patent
      summary: "Universal webhook ingest (Node 2 \u2014 API Gateway)"
      description: Per Patent Application 63/991,596, Node 2. HMAC-SHA256 verify, payload hash, queue publish, 200 OK <5ms.
        **Built in GRO-746.**
      operationId: protocol_webhook_ingest
      parameters:
      - name: source
        in: path
        required: true
        schema:
          type: string
        description: Source network identifier (square, shopify, counterpoint, etc.)
      responses:
        '200':
          description: Accepted, event hash assigned
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'
  /v1/protocol/namespace:
    post:
      tags:
      - Protocol-Patent
      summary: .jeffe namespace registration (FIG. 5)
      description: Per Patent Application 63/991,596, FIG. 5. Inscribe namespace ordinal on Bitcoin; indexer caches with `.jeffe`
        suffix. **Built in GRO-751.**
      operationId: protocol_namespace_register
      responses:
        '202':
          description: Inscription submitted
  /v1/protocol/evidence/{event_hash}:
    get:
      tags:
      - Protocol-Patent
      summary: Bilateral verification surface (Sub 1 / L1)
      description: Per Patent Application 63/991,596, Sub 1 / Node 3. Returns L1 evidence record matching the event_hash.
        **Built in GRO-748.**
      operationId: protocol_evidence_get
      parameters:
      - name: event_hash
        in: path
        required: true
        schema:
          type: string
          pattern: ^[0-9a-f]{64}$
      responses:
        '200':
          description: Evidence record
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/protocol/anchor/{event_hash}:
    get:
      tags:
      - Protocol-Patent
      summary: Anchor receipt (inscription_id + Merkle proof)
      description: Per Patent Application 63/991,596, Sub 3 / Node 5/6. Returns the Bitcoin inscription_id and Merkle proof
        path for an event. **Built in GRO-750.**
      operationId: protocol_anchor_get
      parameters:
      - name: event_hash
        in: path
        required: true
        schema:
          type: string
          pattern: ^[0-9a-f]{64}$
      responses:
        '200':
          description: Anchor receipt
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/protocol/verify/{event_hash}:
    get:
      tags:
      - Protocol-Patent
      summary: L402 sat-gated verification
      description: "Per Patent Application 63/991,596. HTTP 402 \u2192 Lightning invoice \u2192 sat payment \u2192 cryptographic\
        \ proof. **Built in GRO-752.**"
      operationId: protocol_verify
      parameters:
      - name: event_hash
        in: path
        required: true
        schema:
          type: string
          pattern: ^[0-9a-f]{64}$
      responses:
        '402':
          description: Payment required (Lightning invoice)
        '200':
          description: Verification proof
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - L402SatGated: []
components:
  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Canonical entity UUID (the row's `id` column).
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque cursor returned from a prior page.
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 500
    TenantId:
      name: tenant_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Restrict to a single tenant (admin contexts only).
  responses:
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required (LNURL-auth or L402)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PaymentRequired:
      description: "L402 payment required \u2014 server returns a Lightning invoice; client pays and retries with the macaroon\
        \ + preimage."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict (duplicate key, idempotency violation)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required:
